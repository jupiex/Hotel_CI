<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Radisson CI — Board View</title>
<style>
  :root { --bg:#0e1116; --panel:#161b22; --border:#2a323d; --text:#e6edf3;
    --muted:#8b949e; --red:#da3633; --yellow:#d29922; --green:#2ea043; --accent:#f7c948; }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif; }
  header { padding: 32px 48px 20px; border-bottom: 1px solid var(--border); }
  h1 { margin: 0; font-size: 22px; font-weight: 600; }
  header p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
  .meta { margin-top: 14px; font-size: 13px; color: var(--muted); }
  main { padding: 32px 48px 80px; max-width: 1100px; }
  .status-hero { display: flex; align-items: center; gap: 20px; padding: 24px 28px;
    border-radius: 12px; margin-bottom: 28px; border: 1px solid var(--border); background: var(--panel); }
  .status-dot { width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.RED { background: var(--red); box-shadow: 0 0 20px rgba(218,54,51,0.4); }
  .status-dot.YELLOW { background: var(--yellow); box-shadow: 0 0 20px rgba(210,153,34,0.4); }
  .status-dot.GREEN { background: var(--green); box-shadow: 0 0 20px rgba(46,160,67,0.4); }
  .status-text h2 { margin: 0; font-size: 20px; }
  .status-text p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
  h2.section { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 28px 0 12px; font-weight: 600; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 22px; margin-bottom: 12px; }
  .card.RED { border-left: 4px solid var(--red); }
  .card.YELLOW { border-left: 4px solid var(--yellow); }
  .card.GREEN { border-left: 4px solid var(--green); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-title { font-weight: 600; font-size: 15px; }
  .card-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    letter-spacing: 0.06em; white-space: nowrap; }
  .pill.RED { background: rgba(218,54,51,0.15); color: #f97066; }
  .pill.YELLOW { background: rgba(210,153,34,0.15); color: #f1c40f; }
  .pill.GREEN { background: rgba(46,160,67,0.15); color: #56d364; }
  .rec { margin-top: 10px; font-size: 13px; color: var(--text); line-height: 1.5; }
  .rec b { color: var(--accent); }
  .agent-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
  .agent-tile { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; text-align: center; }
  .agent-tile .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .agent-tile .status { font-size: 18px; font-weight: 700; margin-top: 6px; }
  .agent-tile .status.RED { color: #f97066; } .agent-tile .status.YELLOW { color: #f1c40f; }
  .agent-tile .status.GREEN { color: #56d364; } .agent-tile .status.NO_DATA { color: var(--muted); }
  .brief-body { font-size: 14px; line-height: 1.7; }
  .brief-body h1, .brief-body h2 { font-size: 15px; margin: 16px 0 6px; font-weight: 600; }
  .brief-body ul { padding-left: 20px; } .brief-body li { margin: 4px 0; }
  a.back { display: inline-block; margin-bottom: 20px; color: #58a6ff; font-size: 13px; text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1>Radisson Hotel Group — CI Board View</h1>
  <p>Quarterly board brief · generated by the 8-agent Early Warning System</p>
  <div class="meta">Generated: <b id="ts">…</b> &nbsp;·&nbsp; Overall system status: <span id="status-label">…</span></div>
</header>
<main>
  <a class="back" href="index.html">← Full analyst dashboard</a>

  <div class="status-hero" id="hero">
    <div class="status-dot" id="hero-dot"></div>
    <div class="status-text">
      <h2 id="hero-title">Loading…</h2>
      <p id="hero-sub"></p>
    </div>
  </div>

  <h2 class="section">Agent status at a glance</h2>
  <div class="agent-grid" id="agent-grid"></div>

  <h2 class="section">Top RED alerts (board action required)</h2>
  <div id="red-cards"></div>

  <h2 class="section">Board brief (AI-synthesised)</h2>
  <div class="card" id="brief-card"><div class="brief-body" id="brief-body">Loading…</div></div>
</main>
<script>
const AGENTS = [
  {id:"entry",label:"Market Entry"},{id:"competitive",label:"Competitive"},
  {id:"revenue",label:"Revenue"},{id:"owner",label:"Owner"},
  {id:"talent",label:"Talent"},{id:"regulatory",label:"Regulatory"},
  {id:"operations",label:"Operations"},
];

async function load() {
  const [sys, brief] = await Promise.all([
    fetch('../outputs/system_status.json?_='+Date.now()).then(r=>r.json()).catch(()=>null),
    fetch('../outputs/board_brief.md?_='+Date.now()).then(r=>r.text()).catch(()=>''),
  ]);
  if (!sys) { document.getElementById('hero-title').textContent='Run python run_all.py first'; return; }

  document.getElementById('ts').textContent = sys.generated_at;
  document.getElementById('status-label').textContent = sys.overall_status;
  document.getElementById('hero-dot').className = 'status-dot ' + sys.overall_status;

  const titles = {RED:'System Alert — Board Action Required',
    YELLOW:'System Watch — Monitor and Prepare', GREEN:'System Clear — No Immediate Action'};
  const subs = {RED:`${sys.red_indicator_count} RED indicators across ${Object.keys(sys.agent_status||{}).length} agents`,
    YELLOW:'One or more YELLOW indicators require monitoring',GREEN:'All agents reporting GREEN'};
  document.getElementById('hero-title').textContent = titles[sys.overall_status]||sys.overall_status;
  document.getElementById('hero-sub').textContent = subs[sys.overall_status]||'';

  // Agent grid
  const ag = document.getElementById('agent-grid');
  ag.innerHTML = AGENTS.map(a => {
    const s = (sys.agent_status||{})[a.id] || 'NO_DATA';
    return `<div class="agent-tile"><div class="label">${a.label}</div><div class="status ${s}">${s}</div></div>`;
  }).join('');

  // Red cards
  const rc = document.getElementById('red-cards');
  const reds = (sys.red_indicators||[]).slice(0,6);
  if (!reds.length) {
    rc.innerHTML = '<div class="card GREEN"><div class="card-title">No RED indicators this period.</div></div>';
  } else {
    rc.innerHTML = reds.map(r => {
      const where = r.market||r.property||r.country||r.rival||'';
      return `<div class="card RED">
        <div class="card-top">
          <div>
            <div class="card-title">${(r.agent||'').toUpperCase()} · ${r.name||''}</div>
            <div class="card-sub">${where} ${r.kit||''}</div>
          </div>
          <span class="pill RED">RED</span>
        </div>
        <div class="rec"><b>Action:</b> ${r.recommendation||''}</div>
      </div>`;
    }).join('');
  }

  // Brief
  document.getElementById('brief-body').innerHTML = brief ? mdHtml(brief) : '<i>No brief generated yet.</i>';
}

function mdHtml(md) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = md.split(/\r?\n/); let out=[]; let inList=false;
  for (let raw of lines) {
    let l = esc(raw).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');
    if (/^### /.test(raw)) { if(inList){out.push('</ul>');inList=false;} out.push('<h2>'+l.slice(4)+'</h2>'); }
    else if (/^## /.test(raw)) { if(inList){out.push('</ul>');inList=false;} out.push('<h2>'+l.slice(3)+'</h2>'); }
    else if (/^# /.test(raw)) { if(inList){out.push('</ul>');inList=false;} out.push('<h1>'+l.slice(2)+'</h1>'); }
    else if (/^- /.test(raw)) { if(!inList){out.push('<ul>');inList=true;} out.push('<li>'+l.slice(2)+'</li>'); }
    else if (raw.trim()==='') { if(inList){out.push('</ul>');inList=false;} }
    else { if(inList){out.push('</ul>');inList=false;} out.push('<p>'+l+'</p>'); }
  }
  if (inList) out.push('</ul>');
  return out.join('\n');
}
load();
</script>
</body>
</html>
