<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Radisson CI — Early Warning System</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --panel-2: #1c232c; --border: #2a323d;
    --text: #e6edf3; --muted: #8b949e;
    --green: #2ea043; --yellow: #d29922; --red: #da3633; --accent: #f7c948;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif; }
  header { padding: 24px 36px 14px; border-bottom: 1px solid var(--border); }
  h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  header p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
  .meta { display: flex; gap: 22px; margin-top: 12px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .meta b { color: var(--text); font-weight: 600; }
  .pill { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; }
  .pill.RED    { background: rgba(218,54,51,0.15);  color: #f97066; }
  .pill.YELLOW { background: rgba(210,153,34,0.15); color: #f1c40f; }
  .pill.GREEN  { background: rgba(46,160,67,0.15);  color: #56d364; }
  .pill.NO_DATA { background: rgba(110,118,129,0.2); color: var(--muted); }
  nav { display: flex; gap: 4px; padding: 0 36px; border-bottom: 1px solid var(--border); overflow-x: auto; }
  nav button { background: transparent; color: var(--muted); border: 0; padding: 12px 16px;
    font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
  nav button:hover { color: var(--text); }
  nav button.active { color: var(--text); border-bottom-color: var(--accent); }
  nav button .pill { margin-left: 8px; }
  main { padding: 24px 36px 60px; max-width: 1500px; }
  h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 24px 0 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .card.RED { border-left: 4px solid var(--red); }
  .card.YELLOW { border-left: 4px solid var(--yellow); }
  .card.GREEN { border-left: 4px solid var(--green); }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .card-title { font-size: 15px; font-weight: 600; }
  .card-sub { color: var(--muted); font-size: 12px; }
  .kit-row { display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; border-top: 1px solid var(--border); font-size: 13px; }
  .kit-label { color: var(--muted); }
  .kit-value { font-weight: 600; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 8px; vertical-align: middle; }
  .dot.RED { background: var(--red); } .dot.YELLOW { background: var(--yellow); } .dot.GREEN { background: var(--green); }
  .hedge { margin-top: 10px; padding: 9px 11px; background: var(--panel-2); border-radius: 6px; font-size: 12px; }
  .hedge b { color: var(--accent); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  th, td { padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { background: var(--panel-2); color: var(--muted); font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.06em; }
  tr:last-child td { border-bottom: none; }
  td.lvl-RED { color: #f97066; font-weight: 600; }
  td.lvl-YELLOW { color: #f1c40f; font-weight: 600; }
  td.lvl-GREEN { color: #56d364; font-weight: 600; }
  a { color: #58a6ff; text-decoration: none; } a:hover { text-decoration: underline; }
  .err { background: rgba(218,54,51,0.1); border: 1px solid var(--red); padding: 14px;
    border-radius: 8px; color: #f97066; }
  .panel { display: none; } .panel.active { display: block; }
  .brief { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 22px 28px; line-height: 1.6; font-size: 14px; }
  .brief h1 { font-size: 18px; margin: 0 0 6px; }
  .brief h2 { color: var(--text); text-transform: none; letter-spacing: 0; font-size: 15px;
    margin: 18px 0 8px; font-weight: 600; }
  .brief ul { padding-left: 22px; } .brief li { margin: 4px 0; }
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat .val { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .stat.RED .val { color: #f97066; } .stat.YELLOW .val { color: #f1c40f; } .stat.GREEN .val { color: #56d364; }
  button.refresh { background: var(--accent); color: #1a1a1a; border: 0; padding: 7px 14px;
    border-radius: 6px; font-weight: 600; font-size: 12px; cursor: pointer; }

  /* ── Deal score styles ── */
  .score-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .score-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px 18px; position: relative; }
  .score-card .rank { position: absolute; top: 12px; right: 14px; font-size: 11px; font-weight: 700;
    color: var(--muted); letter-spacing: .06em; }
  .score-card .market-name { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
  .score-card .country-name { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .score-number { font-size: 48px; font-weight: 800; line-height: 1; margin-bottom: 8px; }
  .score-number.STRONG  { color: #56d364; }
  .score-number.WATCH   { color: #f1c40f; }
  .score-number.CAUTION { color: #fb8500; }
  .score-number.PAUSE   { color: #f97066; }
  .score-bar-wrap { background: rgba(255,255,255,0.07); border-radius: 4px; height: 7px; margin-bottom: 10px; overflow: hidden; }
  .score-bar { height: 7px; border-radius: 4px; transition: width .4s ease; }
  .score-bar.STRONG  { background: #2ea043; }
  .score-bar.WATCH   { background: #d29922; }
  .score-bar.CAUTION { background: #fb8500; }
  .score-bar.PAUSE   { background: #da3633; }
  .band-pill { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .07em;
    padding: 2px 9px; border-radius: 999px; margin-bottom: 10px; }
  .band-pill.STRONG  { background: rgba(46,160,67,.18);  color: #56d364; }
  .band-pill.WATCH   { background: rgba(210,153,34,.18); color: #f1c40f; }
  .band-pill.CAUTION { background: rgba(251,133,0,.18);  color: #fb8500; }
  .band-pill.PAUSE   { background: rgba(218,54,51,.18);  color: #f97066; }
  .score-rec   { font-size: 12px; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
  .score-risk  { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .score-risk b { color: var(--accent); }
  .comp-table  { width: 100%; border-collapse: collapse; font-size: 12px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
  .comp-table th, .comp-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .comp-table th { background: var(--panel-2); color: var(--muted); font-size: 10px;
    text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
  .comp-table tr:last-child td { border-bottom: none; }
  .comp-table .comp-name { color: var(--muted); font-size: 11px; }
  .comp-table .comp-weight { color: var(--muted); font-size: 10px; }
  .comp-mini-bar { display: flex; align-items: center; gap: 6px; }
  .comp-mini-bar .bar-bg { flex: 1; background: rgba(255,255,255,.07); border-radius: 3px; height: 5px; overflow: hidden; min-width: 60px; }
  .comp-mini-bar .bar-fill { height: 5px; border-radius: 3px; }
  .comp-mini-bar .bar-fill.GREEN  { background: #2ea043; }
  .comp-mini-bar .bar-fill.YELLOW { background: #d29922; }
  .comp-mini-bar .bar-fill.RED    { background: #da3633; }
  .comp-mini-bar .bar-fill.NO_DATA{ background: var(--muted); }
  .comp-mini-bar .bar-fill.STRONG  { background: #2ea043; }
  .comp-mini-bar .bar-fill.WATCH   { background: #d29922; }
  .comp-mini-bar .bar-fill.CAUTION { background: #fb8500; }
  .comp-mini-bar .bar-fill.PAUSE   { background: #da3633; }
  .score-val { font-size: 12px; font-weight: 700; min-width: 28px; text-align: right; }
  .score-val.GREEN  { color: #56d364; } .score-val.YELLOW { color: #f1c40f; }
  .score-val.RED    { color: #f97066; } .score-val.NO_DATA{ color: var(--muted); }
  .score-total-row td { font-weight: 700; background: var(--panel-2); font-size: 13px; }
  .model-note { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.6; }
</style>
</head>
<body>
<header>
  <h1>Radisson CI — Early Warning System</h1>
  <p>13-agent EWS · CSV inputs → threshold logic → board brief. Reference: Inditex CI prototype.</p>
  <div class="meta">
    <span>System: <span id="overall-pill" class="pill">…</span></span>
    <span>Generated: <b id="generated">…</b></span>
    <span>RED indicators: <b id="red-count">…</b></span>
    <span style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <a href="board.html" style="color:#58a6ff;font-size:12px;text-decoration:none">Board view →</a>
      <button class="refresh" onclick="loadAll()">Refresh</button>
    </span>
  </div>
</header>

<nav id="nav"></nav>

<main>
  <div id="panel-overview" class="panel active">
    <div class="stat-row" id="stat-row"></div>
    <h2>System status by agent</h2>
    <div class="grid" id="overview-cards"></div>
    <h2>All RED indicators</h2>
    <div id="red-table"></div>
  </div>

  <div id="panel-entry" class="panel"></div>
  <div id="panel-competitive" class="panel"></div>
  <div id="panel-revenue" class="panel"></div>
  <div id="panel-owner" class="panel"></div>
  <div id="panel-talent" class="panel"></div>
  <div id="panel-regulatory" class="panel"></div>
  <div id="panel-operations" class="panel"></div>
  <div id="panel-ma" class="panel"></div>
  <div id="panel-brand" class="panel"></div>
  <div id="panel-loyalty" class="panel"></div>
  <div id="panel-esg" class="panel"></div>
  <div id="panel-franchise" class="panel"></div>
  <div id="panel-brief" class="panel"></div>
  <div id="panel-history"    class="panel"></div>
  <div id="panel-whatif"     class="panel"></div>
  <div id="panel-deal_score" class="panel"></div>
</main>

<script>
const AGENTS = [
  {id: "entry",       label: "1. Market Entry"},
  {id: "competitive", label: "2. Competitive"},
  {id: "revenue",     label: "3. Revenue"},
  {id: "owner",       label: "4. Owner"},
  {id: "talent",      label: "5. Talent"},
  {id: "regulatory",  label: "6. Regulatory"},
  {id: "operations",  label: "8. Operations"},
  {id: "ma",          label: "9. M&A Intel"},
  {id: "brand",       label: "10. Brand"},
  {id: "loyalty",     label: "11. Loyalty"},
  {id: "esg",         label: "12. ESG"},
  {id: "franchise",   label: "13. Franchise"},
];

const state = { alerts: {}, system: null, brief: "", history: [], trends: null, dealScore: null, whatifReady: false, wiCompare: false, whatif: null };

function buildNav() {
  const nav = document.getElementById('nav');
  const tabs = [{id: 'overview', label: 'Overview'}, ...AGENTS,
    {id: 'brief',      label: 'Board brief'},
    {id: 'deal_score', label: 'Deal Scores'},
    {id: 'history',    label: 'History'},
    {id: 'whatif',     label: 'What-if'},
  ];
  nav.innerHTML = tabs.map(t =>
    `<button data-tab="${t.id}" onclick="show('${t.id}')">${t.label}<span id="nav-pill-${t.id}" class="pill"></span></button>`
  ).join('');
  show('overview');
}

function show(tab) {
  document.querySelectorAll('nav button').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p =>
    p.classList.toggle('active', p.id === 'panel-' + tab));
  if (tab === 'whatif' && !state.whatifReady) {
    state.whatifReady = true;
    buildWhatif();
  }
}

async function fetchJSON(path) {
  const res = await fetch(path + '?_=' + Date.now());
  if (!res.ok) throw new Error(path + ' missing — run: python run_all.py');
  return res.json();
}

async function fetchText(path) {
  const res = await fetch(path + '?_=' + Date.now());
  if (!res.ok) return '';
  return res.text();
}

async function loadAll() {
  try {
    state.system = await fetchJSON('../outputs/system_status.json');
    for (const a of AGENTS) {
      try { state.alerts[a.id] = await fetchJSON(`../outputs/alerts_${a.id}.json`); }
      catch { state.alerts[a.id] = {agent: a.id, overall_status: 'NO_DATA', indicators: []}; }
    }
    state.brief = await fetchText('../outputs/board_brief.md');
    try { state.history = await fetchJSON('../outputs/history.json'); }
    catch { state.history = []; }
    try { state.trends = await fetchJSON('../outputs/market_trends.json'); }
    catch { state.trends = null; }
    try { state.dealScore = await fetchJSON('../outputs/alerts_deal_score.json'); }
    catch { state.dealScore = null; }
    render();
  } catch (e) {
    document.getElementById('panel-overview').innerHTML = `<div class="err">${e.message}</div>`;
  }
}

function setPill(el, level) {
  el.className = 'pill ' + level;
  el.textContent = level;
}

function render() {
  // Header
  const sys = state.system || {overall_status: 'NO_DATA', red_indicator_count: 0, generated_at: ''};
  setPill(document.getElementById('overall-pill'), sys.overall_status);
  document.getElementById('generated').textContent = sys.generated_at;
  document.getElementById('red-count').textContent = sys.red_indicator_count ?? 0;

  // Nav pills
  document.getElementById('nav-pill-overview').className = 'pill ' + sys.overall_status;
  document.getElementById('nav-pill-overview').textContent = '';
  for (const a of AGENTS) {
    const lvl = state.alerts[a.id]?.overall_status || 'NO_DATA';
    setPill(document.getElementById('nav-pill-' + a.id), lvl);
    document.getElementById('nav-pill-' + a.id).textContent = '';
  }
  document.getElementById('nav-pill-brief').className = 'pill';
  document.getElementById('nav-pill-brief').textContent = '';

  // Overview stats
  const counts = sys.indicator_counts || {};
  document.getElementById('stat-row').innerHTML = `
    <div class="stat RED"><div class="label">RED indicators</div><div class="val">${counts.RED ?? 0}</div></div>
    <div class="stat YELLOW"><div class="label">YELLOW indicators</div><div class="val">${counts.YELLOW ?? 0}</div></div>
    <div class="stat GREEN"><div class="label">GREEN indicators</div><div class="val">${counts.GREEN ?? 0}</div></div>
    <div class="stat"><div class="label">Agents reporting</div><div class="val">${Object.keys(sys.agent_status || {}).length}</div></div>`;

  // Overview cards
  const oc = document.getElementById('overview-cards');
  oc.innerHTML = AGENTS.map(a => {
    const d = state.alerts[a.id]; const lvl = d?.overall_status || 'NO_DATA';
    const reds = (d?.indicators || []).filter(i => i.alert_level === 'RED').length;
    const ylw  = (d?.indicators || []).filter(i => i.alert_level === 'YELLOW').length;
    return `<div class="card ${lvl}">
      <div class="card-head"><div class="card-title">${a.label}</div>
        <span class="pill ${lvl}">${lvl}</span></div>
      <div class="card-sub">${(d?.indicators||[]).length} indicators · ${reds} RED · ${ylw} YELLOW</div>
    </div>`;
  }).join('');

  // RED table
  const reds = (sys.red_indicators || []);
  document.getElementById('red-table').innerHTML = reds.length === 0
    ? `<div class="card GREEN">No RED indicators across the system.</div>`
    : indicatorTable(reds, true);

  // Per-agent panels
  for (const a of AGENTS) renderAgent(a.id, a.label);

  // Brief
  const md = state.brief || '_Brief not yet generated. Run: python run_all.py_';
  document.getElementById('panel-brief').innerHTML =
    `<div class="brief">${mdToHtml(md)}</div>`;

  renderHistory();
  renderDealScore();
}

function indicatorTable(inds, withAgent) {
  const head = ['KIT', withAgent ? 'Agent' : null, 'Name', 'Where', 'Value', 'Level', 'Confidence', 'Source', 'Recommendation']
    .filter(Boolean);
  const rows = inds.map(i => {
    const where = i.market || i.property || i.country || i.rival || '';
    const cells = [
      i.kit || '',
      withAgent ? (i.agent || '').toUpperCase() : null,
      i.name || '',
      where,
      `${i.value ?? ''} ${i.unit || ''}`.trim(),
      `<span class="lvl-${i.alert_level}">${i.alert_level}</span>`,
      i.confidence || '',
      i.source ? (i.source_url ? `<a href="${i.source_url}" target="_blank">${i.source}</a>` : i.source) : '',
      i.recommendation || ''
    ].filter((_, idx) => withAgent || idx !== 1);
    return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
  }).join('');
  return `<table><thead><tr>${head.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>`;
}

function renderAgent(id, label) {
  const d = state.alerts[id]; const el = document.getElementById('panel-' + id);
  if (!d) { el.innerHTML = '<div class="err">No data</div>'; return; }
  const inds = d.indicators || [];

  // Market cards (Agent 1 — entry)
  let marketsHtml = '';
  if (d.markets && d.markets.length) {
    const indByMarket = {};
    inds.forEach(i => { if (i.market) (indByMarket[i.market] = indByMarket[i.market] || []).push(i); });
    marketsHtml = '<h2>Markets</h2><div class="grid">' + d.markets.map(m => {
      const rows = (indByMarket[m.market] || []).map(i =>
        `<div class="kit-row"><span class="kit-label">${i.kit} · ${i.name}</span>
         <span class="kit-value">${i.value ?? '—'}${i.unit ? ' '+i.unit : ''}<span class="dot ${i.alert_level}"></span></span></div>`
      ).join('');
      const hedge = (m.hedging_triggered && m.hedging_triggered.length)
        ? `<div class="hedge"><b>Hedging:</b> ${m.hedging_triggered.join(', ')}</div>` : '';
      return `<div class="card ${m.status}">
        <div class="card-head">
          <div><div class="card-title">${m.market}</div><div class="card-sub">${m.country}</div></div>
          <span class="pill ${m.status}">${m.status}</span>
        </div>${rows}${trendBadgeHtml(m.market)}${hedge}</div>`;
    }).join('') + '</div>';
  }

  // Property cards (Agent 8 — operations)
  let propertiesHtml = '';
  if (d.properties && d.properties.length) {
    const indByProp = {};
    inds.forEach(i => { if (i.property_id) (indByProp[i.property_id] = indByProp[i.property_id] || []).push(i); });
    propertiesHtml = '<h2>Properties — GM daily view</h2><div class="grid">' + d.properties.map(p => {
      const pInds = indByProp[p.property_id] || [];
      // Group by KIT, show worst alert per KIT
      const kitWorst = {};
      pInds.forEach(i => {
        const prev = kitWorst[i.kit]; const priority = {RED:3,YELLOW:2,GREEN:1};
        if (!prev || (priority[i.alert_level]||0) > (priority[prev.alert_level]||0)) kitWorst[i.kit] = i;
      });
      const kitRows = Object.values(kitWorst).map(i =>
        `<div class="kit-row">
          <span class="kit-label">${i.kit} · ${i.name}</span>
          <span class="kit-value">${i.alert_level}<span class="dot ${i.alert_level}"></span></span>
        </div>`).join('');
      // Top RED recommendation
      const topRed = pInds.find(i => i.alert_level === 'RED');
      const actionHtml = topRed
        ? `<div class="hedge"><b>Action:</b> ${topRed.recommendation}</div>` : '';
      return `<div class="card ${p.status}">
        <div class="card-head">
          <div><div class="card-title">${p.property}</div>
          <div class="card-sub">${p.red_count} RED · ${p.yellow_count} YELLOW</div></div>
          <span class="pill ${p.status}">${p.status}</span>
        </div>${kitRows}${actionHtml}</div>`;
    }).join('') + '</div>';
  }

  el.innerHTML = `
    <h2>${label} — status: <span class="pill ${d.overall_status}">${d.overall_status}</span></h2>
    ${propertiesHtml}${marketsHtml}
    <h2>All indicators</h2>
    ${inds.length ? indicatorTable(inds, false) : '<div class="card">No indicators.</div>'}
  `;
}

// ── Trend helpers ──────────────────────────────────────────────────────────
function getTrend(name) {
  const m = state.trends && state.trends.markets;
  if (!m) return null;
  return m[name] || Object.entries(m).find(([k]) => k.toLowerCase() === (name||'').toLowerCase())?.[1] || null;
}

function trendBadgeHtml(name) {
  const t = getTrend(name);
  if (!t) return '';
  const dirIcon  = { escalating: '↑', improving: '↓', stable: '→' };
  const dirColor = { escalating: 'color:#f97066', improving: 'color:#56d364', stable: 'color:var(--muted)' };
  const statColor= { RED:'color:#f97066', YELLOW:'color:#f1c40f', GREEN:'color:#56d364' };
  const runs = t.streak === 1 ? '1 run' : `${t.streak} runs`;
  const icon = dirIcon[t.direction] || '→';
  const dots = (t.history||[]).slice(0,6).map(s => {
    const c = s==='RED'?'var(--red)':s==='YELLOW'?'var(--yellow)':s==='GREEN'?'var(--green)':'var(--muted)';
    return `<span title="${s}" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></span>`;
  }).join('');
  return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--border);flex-wrap:wrap">
    <span style="font-size:11px;font-weight:700;${dirColor[t.direction]||'color:var(--muted)'}">${icon} ${t.direction.charAt(0).toUpperCase()+t.direction.slice(1)}</span>
    <span style="font-size:11px;${statColor[t.current_status]||''}">
      ${t.current_status} for ${runs}${t.streak>1 && t.prev_status!==t.current_status ? ' <span style="color:var(--muted)">(was '+t.prev_status+')</span>':''}</span>
    <div style="display:flex;gap:3px;align-items:center" title="Recent history (newest left)">${dots}</div>
  </div>`;
}

function mdToHtml(md) {
  // tiny markdown: # / ## / ### / **bold** / `code` / lists / paragraphs
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = md.split(/\r?\n/);
  let out = []; let inList = false;
  for (let raw of lines) {
    let l = esc(raw);
    l = l.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/`([^`]+)`/g, '<code>$1</code>');
    if (/^### /.test(raw))      { if(inList){out.push('</ul>'); inList=false;} out.push(`<h3>${l.slice(4)}</h3>`); }
    else if (/^## /.test(raw))  { if(inList){out.push('</ul>'); inList=false;} out.push(`<h2>${l.slice(3)}</h2>`); }
    else if (/^# /.test(raw))   { if(inList){out.push('</ul>'); inList=false;} out.push(`<h1>${l.slice(2)}</h1>`); }
    else if (/^- /.test(raw))   { if(!inList){out.push('<ul>'); inList=true;} out.push(`<li>${l.slice(2)}</li>`); }
    else if (raw.trim() === '') { if(inList){out.push('</ul>'); inList=false;} out.push(''); }
    else                        { if(inList){out.push('</ul>'); inList=false;} out.push(`<p>${l}</p>`); }
  }
  if (inList) out.push('</ul>');
  return out.join('\n');
}

    `<th style="min-width:60px;font-size:10px">${s.timestamp?s.timestamp.slice(5,10):'?'}</th>`).join('');
  const abpRows = ['A1','A2','A3','A4','A5'].map(a => {
    const cells = slice.map(s => {

      return at
        ? `<td style="background:rgba(218,54,51,.15);color:#f97066;font-weight:600;text-align:center;font-size:11px">AT RISK</td>`
        : `<td style="background:rgba(46,160,67,.1);color:#56d364;text-align:center;font-size:11px">OK</td>`;
    }).join('');
    return `<tr><td style="font-weight:700;padding:8px 12px">${a}</td>${cells}</tr>`;
  }).join('');

  const abpHtml = `
    <h2>ABP assumption history (last ${slice.length} runs)</h2>
    <div style="overflow-x:auto">
      <table><thead><tr><th>Assumption</th>${abpHead}</tr></thead><tbody>${abpRows}</tbody></table>
    </div>`;

  // Market trends table
  let trendsHtml = '';
  const tm = state.trends && state.trends.markets;
  if (tm && Object.keys(tm).length) {
    const sorted = Object.entries(tm).sort((a, b) => {
      const rank = {RED:3, YELLOW:2, GREEN:1, NO_DATA:0};

    });
    const dirIcon  = { escalating:'↑', improving:'↓', stable:'→' };
    const dirColor = { escalating:'#f97066', improving:'#56d364', stable:'var(--muted)' };
    const statClass= { RED:'lvl-RED', YELLOW:'lvl-YELLOW', GREEN:'lvl-GREEN' };
    const rows = sorted.map(([name, t]) => {
      const dots = (t.history||[]).slice(0,8).map(s => {

        return `<span title="${s}" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};margin-right:2px"></span>`;
      }).join('');
      const changed = t.prev_status !== t.current_status

      const streakTxt = `${t.streak} run${t.streak!==1?'s':''}`;
      return `<tr>

        <td style="color:var(--muted)">${streakTxt}</td>

    }).join('');
    trendsHtml = `
      <h2>Market trend tracker — ${sorted.length} markets · ${state.trends.run_count} run(s)</h2>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Market</th><th>Current status</th><th>Direction</th>
            <th>Streak</th><th>Recent history (newest left)</th>

      </p>`;
  } else {

  }

  el.innerHTML = timelineHtml + chartHtml + abpHtml + trendsHtml;
}

// ── What-if tab ─────────────────────────────────────────────────────────────
const WI_THRESHOLDS = {
  fx:       {yellow:8,  red:15},
  pipeline: {yellow:10, red:15},
  energy:   {yellow:10, red:20},
  wage:     {yellow:3,  red:5 },
  revpar:   {yellow:90, red:80},
};
const WI_NAMES = {
  fx:'FX depreciation vs EUR', pipeline:'Supply pipeline % of stock',
  energy:'Energy cost QoQ', wage:'Minimum wage YoY', revpar:'RevPAR vs budget'
};

function wiLevel(key, val) {
  const t = WI_THRESHOLDS[key];
  if (key === 'revpar') { return val <= t.red ? 'RED' : val <= t.yellow ? 'YELLOW' : 'GREEN'; }
  return val >= t.red ? 'RED' : val >= t.yellow ? 'YELLOW' : 'GREEN';
}

function wiAbp(fx, pipeline, energy, wage, revpar) {
  return {
    A1: Math.abs(fx) > 15 ? 'AT_RISK' : 'HOLDING',
    A2: (pipeline > 15 || revpar < 80) ? 'AT_RISK' : 'HOLDING',
    A3: 'HOLDING',
    A4: (energy > 10 || wage > 10) ? 'BREACHED' : 'HOLDING',
    A5: 'HOLDING',
  };
}

function wiHedging(fx, pipeline, levels) {
  const out = [];
  if (Math.abs(fx) > 15) out.push({id:'H1', short:'H1 — Pause LOI; add FX floor clause',
    full:'FX &gt;15% vs EUR. Pause LOI negotiations; add FX floor clause to term sheets. Owner: Development Director.'});
  if (pipeline > 15) out.push({id:'H2', short:'H2 — Deprioritise market; redirect dev effort',
    full:'Pipeline &gt;15% of existing stock. Deprioritise market; redirect BD effort. Owner: Development Director.'});
  if (Object.values(levels).filter(l=>l==='RED').length >= 2)
    out.push({id:'H3', short:'H3 — 90-day hold + escalate to Development Committee',
      full:'2+ RED indicators simultaneously. 90-day moratorium on new signings; brief Development Committee. Owner: CDO.'});
  return out;
}

function wiSeedValues(market) {
  const inds = (state.alerts.entry || {}).indicators || [];
  const get  = kit => inds.find(i => i.market === market && i.kit === kit);
  const reg  = (state.alerts.regulatory || {}).indicators || [];
  return {
    fx:       parseFloat(get('KIT_3')?.value) || 0,
    pipeline: parseFloat(get('KIT_1')?.value) || 0,
    energy:   parseFloat(reg.find(i => /energy/i.test(i.name||''))?.value) || 0,
    wage:     parseFloat(reg.find(i => /labour|wage/i.test(i.name||''))?.value) || 0,
    revpar:   100,
  };
}

function wiSet(id, val) {
  const el = document.getElementById(id); if (!el) return;
  el.value = val;
  document.getElementById(id+'-val').textContent = val + '%';
}

function wiReset() {
  const market = document.getElementById('wi-market')?.value || 'Riyadh';
  const rv = wiSeedValues(market);
  wiSet('wi-fx',       rv.fx);
  wiSet('wi-pipeline', rv.pipeline);
  wiSet('wi-energy',   rv.energy);
  wiSet('wi-wage',     rv.wage);
  wiSet('wi-revpar',   rv.revpar);
  state.whatif = {...rv};
  state.wiCompare = false;
  const btn = document.getElementById('wi-cmp-btn');
  if (btn) { btn.style.borderColor='var(--border)'; btn.style.color='var(--text)'; }
  calcWhatif();
}

function wiToggleCompare() {
  state.wiCompare = !state.wiCompare;
  const btn = document.getElementById('wi-cmp-btn');
  btn.style.borderColor = state.wiCompare ? 'var(--accent)' : 'var(--border)';
  btn.style.color       = state.wiCompare ? 'var(--accent)' : 'var(--text)';
  calcWhatif();
}

function calcWhatif() {
  const fx       = parseFloat(document.getElementById('wi-fx')?.value)       || 0;
  const pipeline = parseFloat(document.getElementById('wi-pipeline')?.value)  || 0;
  const energy   = parseFloat(document.getElementById('wi-energy')?.value)    || 0;
  const wage     = parseFloat(document.getElementById('wi-wage')?.value)      || 0;
  const revpar   = parseFloat(document.getElementById('wi-revpar')?.value)    || 100;
  const market   = document.getElementById('wi-market')?.value || '';

  const levels  = {
    fx:       wiLevel('fx',       Math.abs(fx)),
    pipeline: wiLevel('pipeline', pipeline),
    energy:   wiLevel('energy',   energy),
    wage:     wiLevel('wage',     wage),
    revpar:   wiLevel('revpar',   revpar),
  };
  const abp     = wiAbp(fx, pipeline, energy, wage, revpar);
  const hedging = wiHedging(fx, pipeline, levels);

  let base = null;
  if (state.wiCompare && state.whatif) {
    const b = state.whatif;
    base = {
      fx:       wiLevel('fx',       Math.abs(b.fx)),
      pipeline: wiLevel('pipeline', b.pipeline),
      energy:   wiLevel('energy',   b.energy),
      wage:     wiLevel('wage',     b.wage),
      revpar:   wiLevel('revpar',   b.revpar),
    };
  }

  const order = {GREEN:0, YELLOW:1, RED:2};
  const indRows = Object.keys(levels).map(k => {
    const lvl = levels[k];
    let delta = '';
    if (base && base[k] !== lvl) {
      const worse = order[lvl] > order[base[k]];
      delta = `<span style="font-size:11px;color:${worse?'#f97066':'#56d364'};margin-left:8px">
        ${worse?'▲ worse':'▼ better'} (was ${base[k]})</span>`;
    }
    return `<tr><td>${WI_NAMES[k]}</td><td class="lvl-${lvl}">${lvl}${delta}</td></tr>`;
  }).join('');

  const abpColor = s => s==='BREACHED'?'#f97066':s==='AT_RISK'?'#f1c40f':'#56d364';
  const abpBg    = s => s==='BREACHED'?'rgba(218,54,51,.15)':s==='AT_RISK'?'rgba(210,153,34,.15)':'rgba(46,160,67,.12)';
  const ABP_DESC = {
    A1:'Owner signs at standard fee',
    A2:'RevPAR breakeven ≤36mo',
    A3:'No cannibalisation (fixed)',
    A4:'Energy &amp; labour &lt;10% YoY',
    A5:'Loyalty share (fixed)',
  };
  const abpBadges = Object.entries(abp).map(([k,v]) =>
    `<div style="display:flex;align-items:center;justify-content:space-between;
      padding:8px 12px;background:${abpBg(v)};border-radius:6px;margin-bottom:6px">
      <span style="font-size:12px"><b>${k}</b> &nbsp;${ABP_DESC[k]}</span>
      <span class="pill" style="background:${abpBg(v)};color:${abpColor(v)}">${v}</span>
    </div>`).join('');

  const hedgeHtml = hedging.length === 0
    ? '<div class="card GREEN" style="font-size:13px">No hedging actions triggered.</div>'
    : hedging.map(h =>
        `<div class="hedge"><b>${h.short}</b><br>
         <span style="color:var(--muted)">${h.full}</span></div>`).join('');

  document.getElementById('wi-output').innerHTML = `
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">
        Market: <b style="color:var(--text)">${market}</b>
        ${state.wiCompare?'&nbsp;<span style="color:var(--accent)">&#9679; Compare mode</span>':''}
      </div>
      <h2 style="margin-top:0">Indicator alert levels</h2>
      <table><thead><tr><th>Indicator</th><th>Alert level</th></tr></thead>
      <tbody>${indRows}</tbody></table>
    </div>
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px">
      <h2 style="margin-top:0">ABP assumption status</h2>
      ${abpBadges}
    </div>
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px">
      <h2 style="margin-top:0">Triggered hedging actions</h2>
      ${hedgeHtml}
    </div>`;
}

buildNav();
loadAll();
</script>
</body>
</html>
